# CronJob that refreshes `arc-runners/ghcr-pull` every 30 minutes.
# GitHub App installation tokens last 1 hour; halving that gives a
# generous window for clock skew + restart latency.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: ghcr-pull-refresher
  namespace: arc-runners
spec:
  schedule: "*/30 * * * *"
  # If a previous run is still going (network blip, kube-apiserver
  # slow), don't pile on.
  concurrencyPolicy: Forbid
  # If the controller misses a scheduled time by more than 5 minutes
  # (cluster sleep, control-plane outage), skip rather than backfill.
  startingDeadlineSeconds: 300
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      ttlSecondsAfterFinished: 600
      template:
        spec:
          serviceAccountName: ghcr-pull-refresher
          restartPolicy: OnFailure
          # Same toleration as the runner pods so the refresher can land
          # on the same node pool. `ephemeral=true:NoSchedule` is the
          # arc-runners convention; harmless if no nodes have it.
          tolerations:
            - effect: NoSchedule
              key: ephemeral
              operator: Equal
              value: "true"
          containers:
            - name: refresher
              # Minimal image baked from `k8s/ghcr-pull-refresher/image/`.
              # Bundles openssl + curl + jq + kubectl; built and pushed
              # by `.github/workflows/refresher-image.yml`. Public on
              # GHCR so it can be pulled without the very credential
              # this CronJob produces.
              image: ghcr.io/dustfeather/ghcr-pull-refresher:latest
              imagePullPolicy: IfNotPresent
              command: ["/scripts/refresh.sh"]
              resources:
                requests:
                  cpu: "10m"
                  memory: "32Mi"
                limits:
                  cpu: "100m"
                  memory: "128Mi"
              securityContext:
                runAsNonRoot: true
                runAsUser: 65532
                runAsGroup: 65532
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
                seccompProfile:
                  type: RuntimeDefault
              volumeMounts:
                - name: script
                  mountPath: /scripts
                  readOnly: true
                - name: app-secret
                  mountPath: /var/run/secrets/github-app
                  readOnly: true
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: script
              configMap:
                name: ghcr-pull-refresher-script
                defaultMode: 0o555
            - name: app-secret
              secret:
                secretName: github-app-dustfeather
                defaultMode: 0o400
            - name: tmp
              emptyDir: {}
