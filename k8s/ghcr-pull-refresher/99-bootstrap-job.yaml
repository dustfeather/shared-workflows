# One-shot Job that runs the same refresh script immediately, so the
# `ghcr-pull` Secret exists BEFORE any runner pod tries to pull the
# pre-baked image. The CronJob would otherwise wait up to 30 minutes
# for its first tick.
#
# Apply this once after the CronJob is in place, then `kubectl delete
# job ghcr-pull-refresher-bootstrap -n arc-runners` to free the name.
# Re-applying without deleting first will fail because Jobs are
# immutable.
#
# Alternative (no manifest): trigger immediately via
#   kubectl create job --from=cronjob/ghcr-pull-refresher \
#     ghcr-pull-bootstrap -n arc-runners
apiVersion: batch/v1
kind: Job
metadata:
  name: ghcr-pull-refresher-bootstrap
  namespace: arc-runners
spec:
  backoffLimit: 2
  ttlSecondsAfterFinished: 600
  template:
    spec:
      serviceAccountName: ghcr-pull-refresher
      restartPolicy: OnFailure
      tolerations:
        - effect: NoSchedule
          key: ephemeral
          operator: Equal
          value: "true"
      containers:
        - name: refresher
          image: ghcr.io/dustfeather/ghcr-pull-refresher:latest
          imagePullPolicy: IfNotPresent
          command: ["/scripts/refresh.sh"]
          resources:
            requests:
              cpu: "10m"
              memory: "32Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: script
              mountPath: /scripts
              readOnly: true
            - name: app-secret
              mountPath: /var/run/secrets/github-app
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: script
          configMap:
            name: ghcr-pull-refresher-script
            defaultMode: 0o555
        - name: app-secret
          secret:
            secretName: github-app-dustfeather
            defaultMode: 0o400
        - name: tmp
          emptyDir: {}
