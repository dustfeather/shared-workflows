name: Claude Code Review (reusable)

on:
  workflow_call:
    inputs:
      trusted-actors:
        description: |
          Comma-separated list of GitHub actors whose PRs may trigger reviews.
          Bots from `allowed-bots` are also accepted in addition to this list.
        type: string
        default: dustfeather
      allowed-bots:
        description: |
          Comma-separated list of bots whose PRs may trigger reviews.
          Passed through to claude-code-action's `allowed_bots` input.
        type: string
        default: "dependabot[bot]"
      show-full-output:
        description: |
          Surface every tool call (gh pr view, gh pr diff, gh pr review, MCP
          inline-comment calls, etc.) in the action log instead of hiding the
          agent transcript behind the final result JSON. Defaults to false so
          the action log stays quiet; flip to true per-caller when you need to
          audit the full agent transcript.
        type: boolean
        default: false
      runner:
        description: |
          Self-hosted ARC scale-set label for the runner pool. Defaults to
          `arc-df-shared-workflows`; each caller normally pins its own
          scale-set (e.g. `arc-df-uninsta`, `arc-itguys-ro-invest`). Must be a
          label backed by the pre-baked `actions-runner-claude` image.
        type: string
        default: "arc-df-shared-workflows"
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true

# Top-level default: minimum read. Each job widens what it needs.
permissions:
  contents: read

jobs:
  review:
    # Trusted human OR allowlisted bot. The format trick wraps both sides in
    # commas so a substring like "dustfeather" doesn't match "dustfeather2".
    if: |
      contains(format(',{0},', inputs.trusted-actors), format(',{0},', github.actor)) ||
      contains(format(',{0},', inputs.allowed-bots), format(',{0},', github.actor))
    runs-on: ${{ inputs.runner }}
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write
    steps:
      - name: Skip if CodeQL has already failed for this PR
        # Cheap bash gate — no agent spin-up if CodeQL is red. Treats
        # IN_PROGRESS / no-result as "proceed" so we don't block reviews
        # waiting for CodeQL on every PR. Combined with the caller's
        # `needs: tests`, this means review only runs on PRs where both
        # tests and CodeQL are passing-or-still-running.
        id: codeql_gate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set -u
          checks=$(gh pr checks "$PR" --repo "$REPO" --json name,state 2>/dev/null || echo "[]")
          codeql_failed=$(echo "$checks" | jq -r '
            [.[] | select(.name | test("CodeQL"; "i"))
                 | select(.state == "FAILURE")] | length')
          if [ "${codeql_failed:-0}" -gt 0 ]; then
            echo "::warning::Skipping review: CodeQL failed on this PR"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repository
        if: steps.codeql_gate.outputs.skip != 'true'
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Build code review graph
        # Parses the checkout into code-review-graph's structural graph so the
        # MCP server (wired into claude_args below) can answer blast-radius /
        # impact / review-context queries. continue-on-error so a review is
        # NEVER blocked if the tool is missing (e.g. runner image not yet
        # rebuilt) or the build fails — the agent prompt falls back to gh pr diff.
        if: steps.codeql_gate.outputs.skip != 'true'
        continue-on-error: true
        run: code-review-graph build

      - name: Run Claude Code Review
        if: steps.codeql_gate.outputs.skip != 'true'
        uses: anthropics/claude-code-action@v1
        env:
          # rtk's hook writes tee logs / reads config under $HOME; disable its
          # once-a-day telemetry so the hook never makes network calls in CI.
          RTK_TELEMETRY_DISABLED: "1"
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: ${{ inputs.allowed-bots }}
          show_full_output: ${{ inputs.show-full-output }}
          # Wire rtk as a PreToolUse hook: it rewrites Bash commands to their
          # token-compressed `rtk ...` form (e.g. `gh pr diff` -> `rtk gh pr
          # diff`). The action seeds ~/.claude/settings.json from this input.
          # rtk rewrites EVERY gh command, so the rewritten `rtk gh ...` forms
          # must also be allow-listed in claude_args below or they get denied.
          settings: |
            {"hooks":{"PreToolUse":[{"matcher":"Bash","hooks":[{"type":"command","command":"rtk hook claude"}]}]}}
          # Hardcoded to the pre-baked `actions-runner-claude` image paths;
          # skips the action's in-job Bun + Claude Code installs.
          path_to_bun_executable: /usr/local/bin/bun
          path_to_claude_code_executable: /usr/local/bin/claude
          prompt: |
            Review pull request #${{ github.event.pull_request.number }} in ${{ github.repository }}.

            First decide which review track applies:

            DEPENDABOT TRACK — if the PR author is "dependabot[bot]":
              - Read the PR title, body, and diff with `gh pr view ${{ github.event.pull_request.number }}` and `gh pr diff ${{ github.event.pull_request.number }}`.
              - Identify whether the bump is patch, minor, or major.
              - Skim the linked release notes / changelog from the PR body for breaking changes.
              - Check that the diff is limited to manifest + lockfile (no unrelated source changes).
              - Decision rules:
                  • Patch: approve unless the changelog explicitly calls out a breaking change in this version.
                  • Minor: approve if changelog has no "breaking" / "BREAKING CHANGE" / removed-API language; otherwise request changes.
                  • Major: request changes by default and ask for human review unless the changelog is unambiguously additive (rare).
                  • Group PRs (multiple bumps): apply the strictest rule across all members.
                  • If diff touches anything beyond lockfile + manifest: request changes.
              - Submit the formal review with the gh CLI (NOT a plain comment):
                  gh pr review ${{ github.event.pull_request.number }} --approve --body "<one-sentence reasoning>"
                  OR
                  gh pr review ${{ github.event.pull_request.number }} --request-changes --body "<what needs human attention>"

            STANDARD TRACK — for any other author:
              - Before reading files by hand, use the code-review-graph MCP tools for structural, token-efficient context:
                  • Get changed files: `gh pr diff ${{ github.event.pull_request.number }} --name-only`.
                  • Call detect_changes / get_impact_radius on those files for blast radius, affected execution flows, and missing-test gaps.
                  • Use get_review_context / query_graph / semantic_search_nodes to pull only the relevant code (callers, callees, tests) instead of whole files.
                  • If the graph tools are unavailable or return empty (graph not built — e.g. unsupported language or build skipped), fall back to reading the diff directly with `gh pr diff`.
              - Do a normal code review: correctness, security, tests, readability.
              - Leave inline comments via mcp__github_inline_comment__create_inline_comment for specific issues.
              - Submit a FORMAL verdict with the gh CLI (NOT a plain --comment review):
                  • Approve if the diff is correct, safe, and needs no human follow-up:
                      gh pr review ${{ github.event.pull_request.number }} --approve --body "<one-sentence reasoning>"
                  • Request changes if anything needs a human to look — correctness/security bug, missing tests, unclear intent, or you are not confident. Minor or trivial items (nits, style, naming, a small cleanup) are also valid grounds; do not soften to an approve just because the issue is small:
                      gh pr review ${{ github.event.pull_request.number }} --request-changes --body "<what needs human attention>"
              - You may also post a top-level `gh pr review --comment --body "..."` summary, but it must accompany a formal verdict, not replace it.
              - When in doubt, request changes. Always end on exactly one of approve/request-changes; never on a plain comment alone.

            Be terse. No emoji. No filler.
          # Opus 4.7 + high effort + adaptive thinking: code review is a
          # judgment-heavy, low-volume, short-output task — spend on the better
          # reasoner. `high` (not `max`) keeps it from deprioritizing the
          # decision rules above; adaptive is required on 4.7 and gives
          # interleaved thinking between the gh tool calls.
          claude_args: >-
            --model claude-opus-4-8
            --effort high
            --thinking adaptive
            --mcp-config '{"mcpServers":{"code-review-graph":{"command":"code-review-graph","args":["serve"]}}}'
            --allowed-tools "Bash(gh pr view:*),Bash(gh pr diff:*),Bash(gh pr review:*),Bash(gh pr comment:*),Bash(gh api:*),Bash(rtk gh pr view:*),Bash(rtk gh pr diff:*),Bash(rtk gh pr review:*),Bash(rtk gh pr comment:*),Bash(rtk gh api:*),mcp__code-review-graph__detect_changes_tool,mcp__code-review-graph__get_impact_radius_tool,mcp__code-review-graph__get_review_context_tool,mcp__code-review-graph__get_affected_flows_tool,mcp__code-review-graph__query_graph_tool,mcp__code-review-graph__semantic_search_nodes_tool,mcp__code-review-graph__get_architecture_overview_tool"
