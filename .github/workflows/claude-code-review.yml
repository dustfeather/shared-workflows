name: Claude Code Review (reusable)

on:
  workflow_call:
    inputs:
      trusted-actors:
        description: |
          Comma-separated list of GitHub actors whose PRs may trigger reviews.
          Bots from `allowed-bots` are also accepted in addition to this list.
        type: string
        default: dustfeather
      allowed-bots:
        description: |
          Comma-separated list of bots whose PRs may trigger reviews.
          Passed through to claude-code-action's `allowed_bots` input.
        type: string
        default: "dependabot[bot]"
      show-full-output:
        description: |
          Surface every tool call (gh pr view, gh pr diff, gh pr review, MCP
          inline-comment calls, etc.) in the action log instead of hiding the
          agent transcript behind the final result JSON. Defaults to true so
          reviews are auditable.
        type: boolean
        default: true
      path-to-bun:
        description: |
          Absolute path to a pre-installed Bun binary on the runner. When
          set, claude-code-action skips its own Bun install step. Defaults to
          `/usr/local/bin/bun`, the path on the pre-baked
          `actions-runner-claude` image used by the default `runner`. Set to
          "" when overriding `runner` to a stock runner (e.g. `ubuntu-latest`),
          where this path does not exist.
        type: string
        default: "/usr/local/bin/bun"
      path-to-claude:
        description: |
          Absolute path to a pre-installed Claude Code CLI binary on the
          runner. When set, claude-code-action skips its own install step.
          Defaults to `/usr/local/bin/claude`, the path on the pre-baked
          `actions-runner-claude` image used by the default `runner`. Set to
          "" when overriding `runner` to a stock runner (e.g. `ubuntu-latest`),
          where this path does not exist.
        type: string
        default: "/usr/local/bin/claude"
      runner:
        description: |
          Label (or labels) for the runner pool. Defaults to the self-hosted
          ARC scale-set label `arc-df-shared-workflows`. Override with another
          self-hosted label (e.g. `arc-df`, `arc-itguys-ro`,
          `arc-itguys-ro-degoog-infra`) or GitHub-hosted `ubuntu-latest`.
          Self-hosted labels run the pre-baked `actions-runner-claude` image,
          where the `path-to-bun` / `path-to-claude` defaults point, so the
          action skips its Bun/Claude installs. If you override to a stock
          runner (e.g. `ubuntu-latest`), also set `path-to-bun` and
          `path-to-claude` to "" — those baked paths do not exist there.
        type: string
        default: "arc-df-shared-workflows"
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true

# Top-level default: minimum read. Each job widens what it needs.
permissions:
  contents: read

jobs:
  review:
    # Trusted human OR allowlisted bot. The format trick wraps both sides in
    # commas so a substring like "dustfeather" doesn't match "dustfeather2".
    if: |
      contains(format(',{0},', inputs.trusted-actors), format(',{0},', github.actor)) ||
      contains(format(',{0},', inputs.allowed-bots), format(',{0},', github.actor))
    runs-on: ${{ inputs.runner }}
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write
    steps:
      - name: Skip if CodeQL has already failed for this PR
        # Cheap bash gate — no agent spin-up if CodeQL is red. Treats
        # IN_PROGRESS / no-result as "proceed" so we don't block reviews
        # waiting for CodeQL on every PR. Combined with the caller's
        # `needs: tests`, this means review only runs on PRs where both
        # tests and CodeQL are passing-or-still-running.
        id: codeql_gate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set -u
          checks=$(gh pr checks "$PR" --repo "$REPO" --json name,state 2>/dev/null || echo "[]")
          codeql_failed=$(echo "$checks" | jq -r '
            [.[] | select(.name | test("CodeQL"; "i"))
                 | select(.state == "FAILURE")] | length')
          if [ "${codeql_failed:-0}" -gt 0 ]; then
            echo "::warning::Skipping review: CodeQL failed on this PR"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repository
        if: steps.codeql_gate.outputs.skip != 'true'
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        if: steps.codeql_gate.outputs.skip != 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: ${{ inputs.allowed-bots }}
          show_full_output: ${{ inputs.show-full-output }}
          path_to_bun_executable: ${{ inputs.path-to-bun }}
          path_to_claude_code_executable: ${{ inputs.path-to-claude }}
          prompt: |
            Review pull request #${{ github.event.pull_request.number }} in ${{ github.repository }}.

            First decide which review track applies:

            DEPENDABOT TRACK — if the PR author is "dependabot[bot]":
              - Read the PR title, body, and diff with `gh pr view ${{ github.event.pull_request.number }}` and `gh pr diff ${{ github.event.pull_request.number }}`.
              - Identify whether the bump is patch, minor, or major.
              - Skim the linked release notes / changelog from the PR body for breaking changes.
              - Check that the diff is limited to manifest + lockfile (no unrelated source changes).
              - Decision rules:
                  • Patch: approve unless the changelog explicitly calls out a breaking change in this version.
                  • Minor: approve if changelog has no "breaking" / "BREAKING CHANGE" / removed-API language; otherwise request changes.
                  • Major: request changes by default and ask for human review unless the changelog is unambiguously additive (rare).
                  • Group PRs (multiple bumps): apply the strictest rule across all members.
                  • If diff touches anything beyond lockfile + manifest: request changes.
              - Submit the formal review with the gh CLI (NOT a plain comment):
                  gh pr review ${{ github.event.pull_request.number }} --approve --body "<one-sentence reasoning>"
                  OR
                  gh pr review ${{ github.event.pull_request.number }} --request-changes --body "<what needs human attention>"

            STANDARD TRACK — for any other author:
              - Do a normal code review: correctness, security, tests, readability.
              - Leave inline comments via mcp__github_inline_comment__create_inline_comment for specific issues.
              - Submit a top-level review summary with `gh pr review --comment --body "..."`. Do NOT auto-approve human PRs.

            Be terse. No emoji. No filler.
          # Opus 4.7 + high effort + adaptive thinking: code review is a
          # judgment-heavy, low-volume, short-output task — spend on the better
          # reasoner. `high` (not `max`) keeps it from deprioritizing the
          # decision rules above; adaptive is required on 4.7 and gives
          # interleaved thinking between the gh tool calls.
          claude_args: >-
            --model claude-opus-4-7
            --effort high
            --thinking adaptive
            --allowed-tools "Bash(gh pr view:*),Bash(gh pr diff:*),Bash(gh pr review:*),Bash(gh pr comment:*),Bash(gh api:*)"
