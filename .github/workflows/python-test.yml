name: Python test (reusable)

on:
  workflow_call:
    inputs:
      python-version:
        type: string
        default: "3.14"
      working-dir:
        type: string
        default: "."
      requirements:
        description: Path to runtime requirements file (skipped if file is missing)
        type: string
        default: requirements.txt
      dev-requirements:
        description: Path to dev/test requirements file (skipped if file is missing)
        type: string
        default: requirements-dev.txt
      lint-paths:
        description: Space-separated paths passed to `ruff check`
        type: string
        default: "src/ tests/"
      test-paths:
        description: Space-separated paths passed to `pytest`
        type: string
        default: "tests/"
      run-lint:
        type: boolean
        default: true
      run-format-check:
        type: boolean
        default: true
      run-tests:
        type: boolean
        default: true
      run-mypy:
        description: |
          Run `mypy` against `mypy-paths`. Defaults off because mypy is not
          universal — opt in per-repo when the project has it configured.
          mypy must be installed via the dev requirements.
        type: boolean
        default: false
      mypy-paths:
        description: Paths passed to `mypy`
        type: string
        default: "src/"
      runner:
        description: |
          Self-hosted ARC scale-set label for the runner pool. Defaults to
          `arc-df-shared-workflows`; each caller normally pins its own
          scale-set (e.g. `arc-df-uninsta`, `arc-itguys-ro-invest`).
        type: string
        default: "arc-df-shared-workflows"

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ inputs.runner }}
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ${{ inputs.working-dir }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}
          cache: pip

      - name: Install dependencies
        env:
          REQ: ${{ inputs.requirements }}
          DEV: ${{ inputs.dev-requirements }}
        run: |
          python -m pip install --upgrade pip
          if [ -f "$REQ" ]; then
            pip install -r "$REQ"
          else
            echo "::notice::No $REQ found, skipping runtime requirements install"
          fi
          if [ -f "$DEV" ]; then
            pip install -r "$DEV"
          else
            echo "::notice::No $DEV found, skipping dev requirements install"
          fi

      - if: inputs.run-lint
        name: ruff check
        run: ruff check ${{ inputs.lint-paths }}

      - if: inputs.run-format-check
        name: ruff format --check
        run: ruff format --check ${{ inputs.lint-paths }}

      - if: inputs.run-mypy
        name: mypy
        run: mypy ${{ inputs.mypy-paths }}

      - if: inputs.run-tests
        name: pytest
        run: pytest ${{ inputs.test-paths }}
