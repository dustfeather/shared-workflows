name: Tag release

# Every push to main bumps the version and re-points the floating major tag
# (v1, v2, ...) at the new commit so `@v1` callers track main.
#
# Versioning scheme (mechanical, NOT semver — but you can override per commit):
#
#   Default (no token in the commit subject):
#     patch += 1; when patch would hit 100 it wraps to 0 and minor += 1.
#     minor grows without bound — major is NEVER bumped automatically,
#     because a major bump can break `@vN` callers.
#
#   Manual override — put one of these tokens in the HEAD commit's subject
#   line when you want a bigger bump for the use case at hand:
#     #major  -> major += 1, minor = 0, patch = 0   (deliberate only)
#     #minor  -> minor += 1, patch = 0
#     #patch  -> patch += 1                          (identical to default)
#   If several appear, the largest wins. The match is a fixed-string search
#   of the HEAD commit message only, so a token mentioned in an older commit
#   won't affect anything — but don't write these tokens verbatim in a commit
#   subject unless you mean them.
on:
  push:
    branches: [main]

permissions:
  contents: write

# Serialize: two quick merges must not both read the same "latest" tag and
# race to create the same next one.
concurrency: tag-release

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compute next version
        id: ver
        run: |
          set -euo pipefail
          git fetch --tags --force --quiet

          # Highest existing vX.Y.Z tag (the bare floating "v1" has no dots so
          # the glob skips it; "^{}" derefs never appear in `git tag -l`).
          latest=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' | sed 's/^v//' | sort -V | tail -1)
          latest=${latest:-0.0.0}
          IFS=. read -r major minor patch <<<"$latest"

          # Manual override token in the HEAD commit subject (fixed-string match).
          msg=$(git log -1 --format='%s%n%b' HEAD)
          if   printf '%s' "$msg" | grep -Fq '#major'; then bump=major
          elif printf '%s' "$msg" | grep -Fq '#minor'; then bump=minor
          else bump=patch
          fi
          echo "Bump: $bump (from v${major}.${minor}.${patch})"

          case "$bump" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
          esac
          # Patch wraps at 100 into minor. Minor is NOT capped — never auto-bump major.
          if [ "$patch" -ge 100 ]; then patch=0; minor=$((minor + 1)); fi

          echo "tag=v${major}.${minor}.${patch}" >> "$GITHUB_OUTPUT"
          echo "major=v${major}" >> "$GITHUB_OUTPUT"
          echo "Next version: v${major}.${minor}.${patch} (floating tag v${major})"

      - name: Create and push tags
        env:
          TAG: ${{ steps.ver.outputs.tag }}
          MAJOR: ${{ steps.ver.outputs.major }}
        run: |
          set -euo pipefail
          git tag "$TAG"
          git tag -f "$MAJOR"
          git push origin "$TAG"
          git push -f origin "$MAJOR"
