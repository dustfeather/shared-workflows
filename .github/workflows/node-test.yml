name: Node test (reusable)

on:
  workflow_call:
    inputs:
      node-version:
        description: Node.js version to set up
        type: string
        default: "24"
      package-manager:
        description: Package manager to use. "auto" detects from lockfile (pnpm > yarn > bun > npm).
        type: string
        default: auto
      pnpm-version:
        description: pnpm major version (used only when package-manager resolves to pnpm)
        type: string
        default: "10"
      working-dir:
        description: Directory containing package.json
        type: string
        default: "."
      script-lint:
        description: package.json script name for lint
        type: string
        default: lint
      script-test:
        description: package.json script name for tests
        type: string
        default: test
      script-typecheck:
        description: package.json script name for type-checking
        type: string
        default: typecheck
      script-build:
        description: package.json script name for the build step (only run when run-build is true)
        type: string
        default: build
      run-lint:
        type: boolean
        default: true
      run-test:
        type: boolean
        default: true
      run-typecheck:
        type: boolean
        default: true
      run-build:
        description: |
          Run the build script to verify it succeeds end-to-end. Off by
          default because not every project has a meaningful `build`
          script in CI. Turn on for projects (e.g. browser extensions)
          where the build itself is the most useful PR-time check.
        type: boolean
        default: false
      run-audit:
        description: |
          Run a dependency vulnerability audit (`npm audit` / `pnpm audit` /
          `yarn audit` / `bun audit`, picked to match the detected package
          manager) and fail the job — and therefore anything gated on it via
          `needs:` (a deploy, a publish) — when a vulnerability at or above
          `audit-level` is present. On by default.
        type: boolean
        default: true
      audit-level:
        description: |
          Minimum severity that fails the audit: low | moderate | high |
          critical. Default high — moderate/low advisories (often in
          transitive dev deps with no fix available) don't block deploys.
        type: string
        default: high
      runner:
        description: |
          Self-hosted ARC scale-set label for the runner pool. Defaults to
          `arc-df-shared-workflows`; each caller normally pins its own
          scale-set (e.g. `arc-df-uninsta`, `arc-itguys-ro-invest`).
        type: string
        default: "arc-df-shared-workflows"

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ inputs.runner }}
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ${{ inputs.working-dir }}
    steps:
      - uses: actions/checkout@v6

      - name: Detect package manager
        id: pm
        env:
          PM_INPUT: ${{ inputs.package-manager }}
        run: |
          if [ "$PM_INPUT" != "auto" ]; then
            echo "pm=$PM_INPUT" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if   [ -f pnpm-lock.yaml ]; then echo "pm=pnpm" >> "$GITHUB_OUTPUT"
          elif [ -f yarn.lock ];      then echo "pm=yarn" >> "$GITHUB_OUTPUT"
          elif [ -f bun.lock ] || [ -f bun.lockb ]; then echo "pm=bun" >> "$GITHUB_OUTPUT"
          else                              echo "pm=npm"  >> "$GITHUB_OUTPUT"
          fi

      - if: steps.pm.outputs.pm == 'pnpm'
        uses: pnpm/action-setup@v6
        with:
          version: ${{ inputs.pnpm-version }}

      - if: steps.pm.outputs.pm == 'bun'
        uses: oven-sh/setup-bun@v2

      # setup-node `cache` accepts npm/yarn/pnpm but not bun. Skip cache for bun.
      - if: steps.pm.outputs.pm != 'bun'
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ steps.pm.outputs.pm }}
      - if: steps.pm.outputs.pm == 'bun'
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}

      - name: Install dependencies
        run: |
          case "${{ steps.pm.outputs.pm }}" in
            pnpm) pnpm install --frozen-lockfile ;;
            npm)  npm ci ;;
            yarn) yarn install --frozen-lockfile ;;
            bun)  bun install --frozen-lockfile ;;
          esac

      - if: inputs.run-audit
        name: Audit dependencies
        env:
          PM: ${{ steps.pm.outputs.pm }}
          LEVEL: ${{ inputs.audit-level }}
        run: |
          set -u
          case "$PM" in
            npm)  npm audit --audit-level="$LEVEL" ;;
            pnpm) pnpm audit --audit-level "$LEVEL" ;;
            bun)  bun audit --audit-level "$LEVEL" ;;
            yarn)
              if yarn --version | grep -q '^1\.'; then
                # Yarn Classic's `yarn audit` exit code is a severity
                # bitmask (1 info, 2 low, 4 moderate, 8 high, 16 critical),
                # OR-ed together — nonzero even for advisories below LEVEL.
                # Re-derive pass/fail from the bits at/above LEVEL.
                yarn audit --level "$LEVEL"; code=$?
                case "$LEVEL" in
                  low)      mask=30 ;;  # 2|4|8|16
                  moderate) mask=28 ;;  # 4|8|16
                  high)     mask=24 ;;  # 8|16
                  critical) mask=16 ;;
                  *)        mask=24 ;;  # treat unknown as "high"
                esac
                if [ $((code & mask)) -ne 0 ]; then exit 1; fi
              else
                yarn npm audit --severity "$LEVEL" --all
              fi
              ;;
          esac

      - name: Detect which scripts exist in package.json
        id: scripts
        env:
          LINT: ${{ inputs.script-lint }}
          TEST: ${{ inputs.script-test }}
          TC:   ${{ inputs.script-typecheck }}
          BLD:  ${{ inputs.script-build }}
        run: |
          has() { jq -e --arg s "$1" '.scripts[$s] // empty' package.json >/dev/null 2>&1 && echo true || echo false; }
          echo "has_lint=$(has "$LINT")"            >> "$GITHUB_OUTPUT"
          echo "has_test=$(has "$TEST")"            >> "$GITHUB_OUTPUT"
          echo "has_typecheck=$(has "$TC")"         >> "$GITHUB_OUTPUT"
          echo "has_build=$(has "$BLD")"            >> "$GITHUB_OUTPUT"

      - if: inputs.run-lint && steps.scripts.outputs.has_lint == 'true'
        name: Lint
        env: { PM: "${{ steps.pm.outputs.pm }}", SCRIPT: "${{ inputs.script-lint }}" }
        run: |
          case "$PM" in
            pnpm) pnpm run "$SCRIPT" ;;
            npm)  npm run "$SCRIPT" ;;
            yarn) yarn run "$SCRIPT" ;;
            bun)  bun run "$SCRIPT" ;;
          esac

      - if: inputs.run-typecheck && steps.scripts.outputs.has_typecheck == 'true'
        name: Type-check
        env: { PM: "${{ steps.pm.outputs.pm }}", SCRIPT: "${{ inputs.script-typecheck }}" }
        run: |
          case "$PM" in
            pnpm) pnpm run "$SCRIPT" ;;
            npm)  npm run "$SCRIPT" ;;
            yarn) yarn run "$SCRIPT" ;;
            bun)  bun run "$SCRIPT" ;;
          esac

      - if: inputs.run-test && steps.scripts.outputs.has_test == 'true'
        name: Test
        env: { PM: "${{ steps.pm.outputs.pm }}", SCRIPT: "${{ inputs.script-test }}" }
        run: |
          case "$PM" in
            pnpm) pnpm run "$SCRIPT" ;;
            npm)  npm run "$SCRIPT" ;;
            yarn) yarn run "$SCRIPT" ;;
            bun)  bun run "$SCRIPT" ;;
          esac

      - if: inputs.run-build && steps.scripts.outputs.has_build == 'true'
        name: Build
        env: { PM: "${{ steps.pm.outputs.pm }}", SCRIPT: "${{ inputs.script-build }}" }
        run: |
          case "$PM" in
            pnpm) pnpm run "$SCRIPT" ;;
            npm)  npm run "$SCRIPT" ;;
            yarn) yarn run "$SCRIPT" ;;
            bun)  bun run "$SCRIPT" ;;
          esac

      - name: Summary of skipped steps
        if: always()
        env:
          HL: ${{ steps.scripts.outputs.has_lint }}
          HT: ${{ steps.scripts.outputs.has_test }}
          HC: ${{ steps.scripts.outputs.has_typecheck }}
          HB: ${{ steps.scripts.outputs.has_build }}
          RL: ${{ inputs.run-lint }}
          RT: ${{ inputs.run-test }}
          RC: ${{ inputs.run-typecheck }}
          RB: ${{ inputs.run-build }}
        run: |
          skipped=()
          [ "$RL" = "true" ] && [ "$HL" = "false" ] && skipped+=("lint(no '${{ inputs.script-lint }}' script)")
          [ "$RT" = "true" ] && [ "$HT" = "false" ] && skipped+=("test(no '${{ inputs.script-test }}' script)")
          [ "$RC" = "true" ] && [ "$HC" = "false" ] && skipped+=("typecheck(no '${{ inputs.script-typecheck }}' script)")
          [ "$RB" = "true" ] && [ "$HB" = "false" ] && skipped+=("build(no '${{ inputs.script-build }}' script)")
          if [ ${#skipped[@]} -gt 0 ]; then
            echo "::notice::Skipped: ${skipped[*]}"
          fi
