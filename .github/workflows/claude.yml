name: Claude Code (interactive, reusable)

on:
  workflow_call:
    inputs:
      trusted-actors:
        description: |
          Comma-separated list of GitHub actors allowed to invoke @claude.
        type: string
        default: dustfeather
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true

# Top-level default: minimum read. The job widens what it needs.
permissions:
  contents: read

jobs:
  claude:
    if: |
      contains(format(',{0},', inputs.trusted-actors), format(',{0},', github.actor)) &&
      (
        (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
        (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Match the reusable review job: Opus 4.7, high effort, adaptive
          # thinking. A comment like "@claude review" lands here (interactive
          # mode), not in the auto-review workflow, so it gets the same depth.
          claude_args: >-
            --model claude-opus-4-7
            --effort high
            --thinking adaptive
