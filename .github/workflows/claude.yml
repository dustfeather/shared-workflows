name: Claude Code (interactive, reusable)

on:
  workflow_call:
    inputs:
      trusted-actors:
        description: |
          Comma-separated list of GitHub actors allowed to invoke @claude.
        type: string
        default: dustfeather
      runner:
        description: |
          Self-hosted ARC scale-set label for the runner pool. Defaults to
          `arc-df-shared-workflows`; each caller normally pins its own
          scale-set (e.g. `arc-df-uninsta`, `arc-itguys-ro-invest`).
        type: string
        default: "arc-df-shared-workflows"
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true

# Top-level default: minimum read. The job widens what it needs.
permissions:
  contents: read

jobs:
  claude:
    if: |
      contains(format(',{0},', inputs.trusted-actors), format(',{0},', github.actor)) &&
      (
        (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
        (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
      )
    runs-on: ${{ inputs.runner }}
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        env:
          # Disable rtk's once-a-day telemetry so its hook never makes network
          # calls in CI.
          RTK_TELEMETRY_DISABLED: "1"
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Wire rtk as a PreToolUse hook so this interactive responder's Bash
          # calls (git, gh, tests, builds, kubectl, …) are rewritten to their
          # token-compressed `rtk ...` form. No --allowed-tools restriction here,
          # so the rewritten commands need no extra allow-listing. The action
          # seeds ~/.claude/settings.json from this input.
          settings: |
            {"hooks":{"PreToolUse":[{"matcher":"Bash","hooks":[{"type":"command","command":"rtk hook claude"}]}]}}
          # Match the reusable review job: Opus 4.7, high effort, adaptive
          # thinking. A comment like "@claude review" lands here (interactive
          # mode), not in the auto-review workflow, so it gets the same depth.
          claude_args: >-
            --model claude-opus-4-7
            --effort high
            --thinking adaptive
