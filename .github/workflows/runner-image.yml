name: Build runner image

on:
  push:
    branches: [main]
    paths:
      - "runner-image/**"
      - ".github/workflows/runner-image.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    # Run on GitHub-hosted, not on our own ARC pool — the ARC pool will be
    # pulling this image, so we must not depend on it to build itself.
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      IMAGE: ghcr.io/${{ github.repository_owner }}/actions-runner-claude
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: runner-image
          file: runner-image/Dockerfile
          push: true
          # amd64 only: the ARC node (acer-laptop) is x86_64. Add arm64
          # here if/when an arm runner joins the pool.
          platforms: linux/amd64
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:sha-${{ github.sha }}
          cache-from: type=registry,ref=${{ env.IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE }}:buildcache,mode=max
