# Reusable release pipeline for browser extensions.
#
# Caller (per-repo .github/workflows/release.yml):
#
#   name: Release
#   on: { push: { branches: [main] } }
#   permissions: { contents: write }
#   concurrency: { group: release, cancel-in-progress: true }
#   jobs:
#     release:
#       uses: dustfeather/shared-workflows/.github/workflows/release-extension.yml@v4
#       with:
#         runner: arc-df-<repo>
#         targets: '["chrome","firefox"]'   # discord-purge adds "userscript"
#         addon-id: <repo>@dustfeather        # firefox AMO; omit if no firefox
#       secrets: inherit
#
# Repo contract (uniform across all extension repos):
#   - pnpm (packageManager pinned, pnpm-lock.yaml committed)
#   - a `build:<target>` script per declared target that:
#       * reads the version from $EXT_VERSION and stamps its own manifest(s)
#       * writes the FINISHED artifact to dist-artifacts/<base>-<target>-<tag>.<ext>
#         chrome -> .zip, firefox -> .xpi, userscript -> .user.js
name: Release extension (reusable)

on:
  workflow_call:
    inputs:
      runner:
        description: ARC scale-set label for this repo's runner pool.
        required: true
        type: string
      targets:
        description: JSON array of build targets. chrome/firefox publish to stores; anything else is release-only.
        type: string
        default: '["chrome","firefox"]'
      base-name:
        description: Artifact filename base. Defaults to the repo name.
        type: string
        default: ""
      addon-id:
        description: Firefox AMO addon id. Required only if "firefox" is in targets.
        type: string
        default: ""
      node-version:
        type: string
        default: "26"

jobs:
  tests:
    permissions:
      contents: read
    uses: dustfeather/shared-workflows/.github/workflows/node-test.yml@v4
    with:
      runner: ${{ inputs.runner }}

  prepare:
    needs: tests
    runs-on: ${{ inputs.runner }}
    permissions:
      contents: write
    outputs:
      version: ${{ steps.ver.outputs.version }}
      tag: ${{ steps.ver.outputs.tag }}
      base: ${{ steps.ver.outputs.base }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Compute next version + push tag
        id: ver
        run: |
          git fetch --tags --force --quiet
          latest=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' | sed 's/^v//' | sort -V | tail -1)
          if [ -z "$latest" ]; then
            next="1.0.0"
          else
            IFS='.' read -r ma mi pa <<< "$latest"
            next="$ma.$mi.$((pa + 1))"
          fi
          base="${{ inputs.base-name }}"
          [ -z "$base" ] && base="${GITHUB_REPOSITORY##*/}"
          echo "version=$next"     >> "$GITHUB_OUTPUT"
          echo "tag=v$next"        >> "$GITHUB_OUTPUT"
          echo "base=$base"        >> "$GITHUB_OUTPUT"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v$next"
          git push origin "v$next"
          echo "Releasing $base v$next (previous: ${latest:-none})"

  build:
    needs: prepare
    runs-on: ${{ inputs.runner }}
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJSON(inputs.targets) }}
    env:
      EXT_VERSION: ${{ needs.prepare.outputs.version }}
      TAG: ${{ needs.prepare.outputs.tag }}
      BASE: ${{ needs.prepare.outputs.base }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.prepare.outputs.tag }}
          fetch-depth: 0
      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - uses: actions/setup-node@v7
        with:
          node-version: ${{ inputs.node-version }}
      - run: pnpm install --frozen-lockfile

      # Repo's build:<target> stamps $EXT_VERSION into its manifest(s) and writes
      # the finished artifact to dist-artifacts/<base>-<target>-<tag>.<ext>.
      - name: Build & package ${{ matrix.target }}
        run: pnpm run "build:${{ matrix.target }}"

      # Firefox source package (AMO review) + release notes — only the firefox
      # leg needs them, so produce them here.
      - name: Package source + release notes (firefox only)
        if: matrix.target == 'firefox'
        run: |
          mkdir -p dist-artifacts
          git archive --format=zip --prefix=source/ \
            -o "dist-artifacts/${BASE}-source-${TAG}.zip" HEAD
          prev=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' | sed 's/^v//' | sort -V | tail -2 | head -1)
          if [ -n "$prev" ] && [ "v$prev" != "$TAG" ]; then
            git log "v${prev}..${TAG}" --pretty=format:"- %s" > dist-artifacts/release-notes.txt || true
          fi
          [ -s dist-artifacts/release-notes.txt ] || echo "- Release ${TAG}" > dist-artifacts/release-notes.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: extensions-${{ matrix.target }}
          path: dist-artifacts/
          if-no-files-found: error

  release:
    needs: [prepare, build]
    runs-on: ${{ inputs.runner }}
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: extensions-*
          path: dl
          merge-multiple: true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          generate_release_notes: true
          files: |
            dl/*.zip
            dl/*.xpi
            dl/*.user.js

  publish-chrome:
    needs: [prepare, build]
    if: contains(fromJSON(inputs.targets), 'chrome')
    uses: dustfeather/shared-workflows/.github/workflows/publish-chrome.yml@v4
    with:
      runner: ${{ inputs.runner }}
      artifact-name: extensions-chrome
      zip-name: ${{ needs.prepare.outputs.base }}-chrome-${{ needs.prepare.outputs.tag }}.zip
    secrets: inherit

  publish-firefox:
    needs: [prepare, build]
    if: contains(fromJSON(inputs.targets), 'firefox')
    uses: dustfeather/shared-workflows/.github/workflows/publish-firefox.yml@v4
    with:
      runner: ${{ inputs.runner }}
      artifact-name: extensions-firefox
      xpi-name: ${{ needs.prepare.outputs.base }}-firefox-${{ needs.prepare.outputs.tag }}.xpi
      source-name: ${{ needs.prepare.outputs.base }}-source-${{ needs.prepare.outputs.tag }}.zip
      addon-id: ${{ inputs.addon-id }}
    secrets: inherit
